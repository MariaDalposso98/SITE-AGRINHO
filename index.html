
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Sustentável - Futuro Forte</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <main class="hero-container">
        <section class="content-box">
            <div class="badge">
                <i data-lucide="leaf"></i>
                <span>Produção & Meio Ambiente</span>
            </div>
            
            <h1>Agro Forte: O Futuro é <span>Sustentável</span></h1>
            
            <p>
                Unindo tecnologia de ponta e respeito à biodiversidade para alimentar o mundo sem comprometer as próximas gerações. O equilíbrio perfeito entre produtividade e conservação.
            </p>

            <div class="cta-group">
                <button class="btn btn-primary" onclick="handleAction('saiba-mais')">Conheça Nossas Práticas</button>
                <button class="btn btn-outline" onclick="handleAction('video')">
                    <i data-lucide="play-circle"></i> Ver Vídeo
                </button>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <strong id="counter-co2">0</strong>
                    <span>Redução de CO₂</span>
                </div>
                <div class="stat-item">
                    <strong id="counter-prod">0</strong>
                    <span>Eficiência Extra</span>
                </div>
            </div>
        </section>

        <section class="visual-element">
            <div class="image-wrapper">
                <div class="blob"></div>
                <img src="https://images.unsplash.com/photo-1592982537447-7440770cbfc9?auto=format&fit=crop&q=80&w=800" alt="Agricultura de precisão">
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
